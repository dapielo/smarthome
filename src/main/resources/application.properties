spring.application.name=smart_home

# configuracion del datasource
spring.datasource.url=jdbc:h2:file:./smarthomebd
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=david
spring.datasource.password=1234

# Para ver errores en la consola
server.error.include-message=always

# configuracion de h2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# configuracion de JPA (hibernate)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
# tamaño maximo de la imagen
spring.servlet.multipart.max-file-size=3MB
# tamaño maximo de la peticion
spring.servlet.multipart.max-request-size=3MB

# carpeta para los archivos
upload.dir=./uploads
